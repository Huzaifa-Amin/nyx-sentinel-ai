title: Suspicious PowerShell Execution with Encoded Command
id: b2c3d4e5-f6a7-8901-bcde-f23456789012
status: stable
description: >
  Detects execution of PowerShell with obfuscation indicators commonly
  used by attackers to bypass script-block logging, AMSI, and endpoint
  detection. Triggers on Base64-encoded payloads, download cradles,
  bypass flags, and execution policy overrides.
author: NYX SENTINEL AI
date: 2024-01-01
modified: 2024-06-01
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/powershell/
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.t1059.001
  - attack.t1027
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_encoded:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-e '
      - '-ec '
  selection_download:
    CommandLine|contains:
      - 'DownloadString'
      - 'DownloadFile'
      - 'Invoke-WebRequest'
      - 'iwr '
      - 'curl '
      - 'wget '
  selection_bypass:
    CommandLine|contains:
      - '-ExecutionPolicy Bypass'
      - '-ep bypass'
      - '-NonInteractive'
      - '-NoProfile'
      - 'Set-ExecutionPolicy'
  selection_suspicious_cmdlets:
    CommandLine|contains:
      - 'Invoke-Expression'
      - 'IEX('
      - 'IEX '
      - '[System.Reflection.Assembly]'
      - 'FromBase64String'
      - 'System.Net.WebClient'
      - 'amsiInitFailed'
  condition: selection_image and (1 of selection_*)
falsepositives:
  - Legitimate system administration scripts
  - Software deployment tools (SCCM, Ansible, Chocolatey)
  - Legitimate IT automation pipelines
  - Monitoring agents that use PowerShell
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - ProcessId
wazuh:
  rule_id: "92201"
  rule_level: 12
  rule_groups:
    - windows
    - win_ms_powershell
    - process_creation
mitre:
  techniques:
    - T1059.001
    - T1027
  tactics:
    - Execution
    - Defense Evasion
response_actions:
  - Decode and analyse the Base64 payload immediately
  - Check PowerShell ScriptBlock logs (Event ID 4104)
  - Review parent process to determine infection vector
  - Search for the same command on all endpoints
  - Check for downloaded files or injected processes
